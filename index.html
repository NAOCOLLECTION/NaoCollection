<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinjamCash - System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login-layer" class="glass active-layer" style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column;">
    <h2>🔐 Login Sistem</h2>
    <input type="text" id="log-user" placeholder="Username" style="margin-bottom:10px; padding:12px; width:80%;">
    <input type="password" id="log-pass" placeholder="Password" style="margin-bottom:15px; padding:12px; width:80%;">
    <button onclick="prosesLogin()" style="padding:12px 24px; background:#007AFF; color:white; border-radius:8px; border:none; font-weight:bold;">MASUK</button>
  </div>

  <div id="dashboard-layer" style="display:none; padding: 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 id="welcome-text">Halo, User</h3>
        <div id="jam-tanggal" style="font-size:12px; font-weight:bold; color:#888;"></div>
    </div>

    <div id="admin-panel" class="glass card" style="display:none; margin-top:20px; background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);">
        <h4>📊 Statistik Admin</h4>
        <div style="display:flex; justify-content:space-between; margin-top:10px;">
            <div><small>Total Modal Keluar:</small><br><b id="admin-modal" style="color:red;">Rp 0</b></div>
            <div><small>Keuntungan Bersih (Lunas):</small><br><b id="admin-untung" style="color:green;">Rp 0</b></div>
        </div>
        <button id="btn-add-staff" style="margin-top:15px; display:none;">+ Tambah Staff (SuperAdmin)</button>
        <button onclick="bukaMenuApproval()" style="margin-top:5px; background:orange;">Cek Antrian Approval Edit</button>
    </div>

    <div class="glass card" style="margin-top:20px;">
        <h3>💸 Pengajuan Pinjaman</h3>
        <input type="tel" id="input-hp" placeholder="No HP Pelanggan (Wajib)">
        <input type="text" id="input-nama" placeholder="Nama Pelanggan">
        
        <select id="input-nominal" onchange="hitungSistem()" style="margin-top:10px;">
            <option value="">-- Pilih Nominal (100rb - 1Jt) --</option>
            <option value="100000">100.000</option>
            <option value="200000">200.000</option>
            <option value="300000">300.000</option>
            <option value="400000">400.000</option>
            <option value="500000">500.000</option>
            <option value="600000">600.000</option>
            <option value="700000">700.000</option>
            <option value="800000">800.000</option>
            <option value="900000">900.000</option>
            <option value="1000000">1.000.000</option>
        </select>

        <div id="preview-hitungan" style="display:none; margin-top:15px; padding:10px; background:#f0f0f0; border-radius:8px;">
            <div>Bunga: <b id="out-bunga"></b></div>
            <div>Tenor: <b id="out-tenor"></b></div>
            <div>Total Tagihan: <b id="out-total"></b></div>
            <hr>
            <div style="font-size:12px; color:green;">Komisi Staff (10% dr bunga): <b id="out-komisi"></b></div>
        </div>

        <button onclick="submitPinjaman()" style="width:100%; margin-top:15px; padding:12px; background:#28a745; color:white; border-radius:8px; border:none; font-weight:bold;">SIMPAN PENGAJUAN</button>
    </div>
    
    <button onclick="prosesLogout(true)" style="width:100%; margin-top:20px; padding:12px; background:#dc3545; color:white; border-radius:8px; border:none; font-weight:bold;">LOGOUT</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
